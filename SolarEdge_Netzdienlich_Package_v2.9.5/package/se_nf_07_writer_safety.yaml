automation:
  # ============================================================
  # SE NF V2.9.4a
  # Master AUS = Fail-open Defaults
  # Ziel:
  # - Netzdienlich AUS darf den SolarEdge nicht limitiert lassen
  # - Charge Limit zurück auf 5000 W
  # - Discharge Limit zurück auf 5000 W
  # - Session geschlossen
  # ============================================================
  - id: se_nf_v294a_master_off_defaults
    alias: "SolarEdge: Netzdienlich V2.9.4a Master AUS Defaults"
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.se_netzdienlich_enabled
        to: "off"
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "off"
    action:
      - variables:
          charge_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          discharge_entity: "number.solaredge_i1_storage_discharge_limit"
          default_w: 5000
          charge_valid: >-
            {{ charge_entity not in ['unknown','unavailable','none','']
               and states(charge_entity) not in ['unknown','unavailable','none',''] }}
          discharge_valid: >-
            {{ states(discharge_entity) not in ['unknown','unavailable','none',''] }}

      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.se_nf_critical_deficit_latched_today
            - input_boolean.se_nf_lifetime_target_reached

      - service: input_select.select_option
        target:
          entity_id: input_select.se_nf_session_state
        data:
          option: "closed"

      - if:
          - condition: template
            value_template: "{{ charge_valid }}"
        then:
          - service: number.set_value
            data:
              entity_id: "{{ charge_entity }}"
              value: "{{ default_w }}"

      - if:
          - condition: template
            value_template: "{{ discharge_valid }}"
        then:
          - service: number.set_value
            data:
              entity_id: "{{ discharge_entity }}"
              value: "{{ default_w }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_last_write
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: system_log.write
        data:
          level: warning
          message: >-
            SE NF V2.9.4a Master AUS Defaults: Charge/Discharge Limits auf 5000 W zurückgesetzt.

  # ============================================================
  # SE NF V2.9.4b
  # Close darf Cooldown umgehen
  # Ziel:
  # - Nach Master EIN muss target=0 sofort wieder schließen
  # - Cooldown darf kein Sicherheits-/Planungs-Close blockieren
  # - Behebt: target=0, actual=5000, writer_mode=blocked_cooldown
  # ============================================================
  - id: se_nf_v294b_writer_close_bypass
    alias: "SolarEdge: Netzdienlich V2.9.4b Writer Close Bypass"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.se_netzdienlich_enabled
          - sensor.se_nf_charge_limit_target
          - sensor.se_nf_desired_target
          - sensor.se_nf_writer_mode
          - number.solaredge_i1_storage_charge_limit
      - platform: time_pattern
        minutes: "/1"

    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"

      - condition: template
        value_template: >-
          {% set target = states('sensor.se_nf_charge_limit_target') | float(states('sensor.se_nf_desired_target') | float(5000)) %}
          {% set actual = states('number.solaredge_i1_storage_charge_limit') | float(0) %}
          {% set mode = states('sensor.se_nf_writer_mode') %}
          {{
            target <= 100
            and actual >= 1000
            and mode in ['blocked_cooldown', 'blocked_lock', 'priority_open', 'normal', 'idle']
          }}

    action:
      - service: number.set_value
        target:
          entity_id: number.solaredge_i1_storage_charge_limit
        data:
          value: 0

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_last_write
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: system_log.write
        data:
          level: warning
          message: >-
            SE NF V2.9.4b Writer Close Bypass: target <= 100 W und actual >= 1000 W, deshalb Charge-Limit sofort auf 0 W gesetzt.
