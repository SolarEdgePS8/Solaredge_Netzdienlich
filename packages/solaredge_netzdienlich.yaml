          {% set open_w = states('input_number.se_nf_open_charge_limit_w') | float(5000) %}
          {% set lifetime_reached = is_state('input_boolean.se_nf_lifetime_target_reached','on') %}
          {% if not enabled %}
            {{ open_w | round(0) }}
          {% elif not config_ok or not sanity_ok %}
            {{ open_w | round(0) }}
          {% elif state in ['evcc_override','low_soc','risk'] %}
            {{ open_w | round(0) }}
          {% elif mode == 'Eigenverbrauch maximieren' %}
            {{ open_w | round(0) }}
          {% elif mode == 'Akku schonen' and lifetime_reached %}
            {{ closed_w | round(0) }}
          {% elif state in ['open','battery_full_open'] %}
            {{ open_w | round(0) }}
          {% else %}
            {{ closed_w | round(0) }}
          {% endif %}

