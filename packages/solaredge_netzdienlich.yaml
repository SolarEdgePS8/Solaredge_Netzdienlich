            {% set max_soc = states('input_number.se_nf_lifetime_max_soc_pct') | float(85) %}
            {% set raw = reserve + ((night + safety) / cap * 100) %}
            {{ [[raw, min_soc] | max, max_soc] | min | round(1) }}
          {% else %}
            {{ states('input_number.se_nf_target_soc_pct') | float(0) | round(1) }}
