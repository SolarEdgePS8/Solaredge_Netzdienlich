###############################################################################
# packages/solaredge_netzdienlich.yaml
#
# V2.8 Clean Session Controller
# V2.9.0 Smartes Speichermanagement: Eigenversorgung / minimale Netzeinspeisung / Batterielebensdauer
# V2.8.1 Planning Guard: 00:00/ungültige Startzeit darf keine Ladesession öffnen
# V2.8.2 Weather Planning: Wetter früh/mittag/nachmittag wieder als ruhiger Planungsfaktor
# V2.8.3 Weather Condition Fallback: nutzt condition, wenn cloud_coverage/precipitation_probability fehlen
# V2.8.4 Weather Missing-Sample Fallback: kein Stundenforecast => current condition oder konservativer Faktor
# V2.8.5 Current Weather Cap: aktueller Wetterzustand deckelt heutige Planung konservativ
# V2.8.6 Safety Guard: Prioritäts-Open-Writes, hartes Schreibziel, Sanity-/Kompatibilitäts-Sensoren
# V2.8.9 Stability Patch: Sanity-Fail-Open, defensiver 06:00-Reset, stabile SQL-7-Tage-Auswahl
# V2.8.9a Log Cleanup: kurze Decision-Reason, numerische SQL-Fallbacks, echte 7-Tage-Auswahl
#
# Ziel:
# - Rückbau der gewachsenen V2.4/V2.5/V2.6/V2.7-Reconcile-/Latch-/Self-Heal-Kette.
# - Nur ein Stellhebel:
#     number.solaredge_i1_storage_charge_limit
# - Nur ein Writer.
# - Nur eine Zielentscheidung.
# - Nach OPEN kein Zurück auf CLOSED wegen Live-Margin-/Forecast-Schwankungen.
#
# Bedeutung SolarEdge Charge Limit:
# - 0 W    = Speicher-Laden blockieren / PV zuerst Haus/Netz
# - 5000 W = Speicher-Laden erlauben
#
# Session-Logik:
# - CLOSED: morgens / vor Ladefenster, Ziel 0 W
# - ARMED: Ladefenster berechnet, Ziel 0 W
# - OPEN: Ladefenster aktiv, Ziel 5000 W
# - BATTERY_FULL_OPEN: Akku voll während geöffneter Session, Ziel bleibt 5000 W
# - DONE: PV-Ende + Nachlauf erreicht, Ziel 0 W
# - EVCC_OVERRIDE: EVCC fordert Laden, Ziel 5000 W
# - LOW_SOC: SoC zu niedrig, Ziel 5000 W
# - RISK: relevante Daten fehlen, fail-open 5000 W
#
# Update-News / individuelle Anpassungen nach YAML-Update:
# 1. input_text.se_nf_charge_limit_entity prüfen
# 2. input_text.se_nf_pv_today_remaining_entity prüfen
# 3. input_text.se_nf_pv_today_total_entity prüfen
# 4. input_text.se_nf_pv_tomorrow_entity prüfen
# 5. input_text.se_nf_battery_soe_entity prüfen
# 6. input_text.se_nf_battery_capacity_entity prüfen
# 7. input_number.se_nf_battery_capacity_kwh_fallback nur setzen,
#    wenn SolarEdge keine Kapazität liefert
# 8. sensor.se_nf_config_check muss "ok" sein
# 9. sensor.se_nf_today_charge_window und sensor.se_nf_tomorrow_charge_window prüfen
#
# Bewusst nicht mehr enthalten:
# - V2.5a Close-Reconcile als eigener SolarEdge-Schreiber
# - V2.5b Open-Reconcile als eigener SolarEdge-Schreiber
# - V2.6z Self-Heal als eigener SolarEdge-Schreiber
# - mehrere parallele Writer
# - festes weather. im Steuerpfad
# - DWD-/Wetter-Hardcoding
# - SQL-/7d-/Live-Margin-Rückkopplung als direkte Schreibgrundlage
###############################################################################

