          {% set min_h = min_hour | int(0) %}
          {% set min_m = ((min_hour - min_h) * 60) | round(0) | int(0) %}
          {% set min_ts = as_timestamp(today_at('%02d:%02d:00' | format(min_h, min_m)), 0) | int(0) %}
          {% set end_grace_ts = states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) %}
          {% set day_start_ts = as_timestamp(today_at('06:00:00'), 0) | int(0) %}
          {% set need = states('sensor.se_nf_needed_energy') | float(0) %}
          {% set pv_for_akku = states('sensor.se_nf_available_pv_for_battery_today') | float(99) %}
          {% set margin = states('sensor.se_nf_live_battery_pv_margin') | float(99) %}
          {% set remaining = states('sensor.se_nf_remaining_pv_today') | float(0) %}
          {% set forecast_now = states('sensor.se_nf_live_pv_forecast_now') | float(0) %}
          {% set critical_latched_today = is_state('input_boolean.se_nf_critical_deficit_latched_today','on') %}
          {% set critical_planned_valid =
             critical_latched_today
             and planned_ts > 0
             and planned_ts >= day_start_ts
             and planned_ts <= end_grace_ts
             and is_state('sensor.se_nf_sanity_check','ok')
             and is_state('sensor.se_nf_config_check','ok')
             and is_state('binary_sensor.se_nf_risk_flag','off') %}
          {% set planned_valid = (planned_ts >= min_ts and planned_ts <= end_grace_ts) or critical_planned_valid %}
          {% if planned_valid %}
