      - name: "SE NF Decision Reason"
        unique_id: se_nf_decision_reason
        icon: mdi:text-box-search-outline
        state: >-
          {% set enabled = is_state('input_boolean.se_netzdienlich_enabled','on') %}
          {% set cfg = states('sensor.se_nf_config_check') %}
          {% set sanity = states('sensor.se_nf_sanity_check') %}
          {% set s = states('input_select.se_nf_session_state') %}
          {% set start_ts = states('sensor.se_nf_active_planned_start_timestamp') | int(0) %}
          {% set start = start_ts | timestamp_custom('%H:%M', true) if start_ts > 0 else 'unbekannt' %}
          {% if not enabled %}
            Deaktiviert · fail-open
          {% elif cfg != 'ok' %}
            Config {{ cfg }} · fail-open
          {% elif sanity != 'ok' %}
            Sanity {{ sanity }} · fail-open
          {% elif s == 'closed' %}
            Geschlossen · warte auf Planung
          {% elif s == 'armed' %}
            Geplant · Start {{ start }} · noch geschlossen
          {% elif s == 'open' %}
            Offen · Ladefreigabe aktiv
          {% elif s == 'battery_full_open' %}
            Akku voll · Freigabe bleibt offen
          {% elif s == 'done' %}
            Erledigt · Tagesfenster beendet
          {% elif s == 'evcc_override' %}
            EVCC Override · Freigabe aktiv
          {% elif s == 'low_soc' %}
            Low-SoC · Freigabe aktiv
          {% elif s == 'risk' %}
            Risk · fail-open
          {% else %}
            {{ s }}
          {% endif %}
        attributes:
          full_reason: "{{ states('sensor.se_nf_start_gate_reason') }}"
