        unique_id: se_nf_lifetime_latch_repair_version
        icon: mdi:tag
        state: "2.9.3c-lifetime-latch-repair"

      - name: "SE NF Lifetime Latch Repair Status"
        unique_id: se_nf_lifetime_latch_repair_status
        icon: mdi:battery-sync
        state: >-
          {% set enabled = is_state('input_boolean.se_nf_lifetime_latch_repair_enabled','on') %}
          {% set mode = states('input_select.se_nf_optimization_mode') %}
          {% set session = states('input_select.se_nf_session_state') %}
          {% set latch = is_state('input_boolean.se_nf_lifetime_target_reached','on') %}
          {% set soe = states('sensor.se_nf_battery_soe') | float(0) %}
          {% set target = states('sensor.speicher_ziel_ladestand') | float(100) %}
          {% set need = states('sensor.se_nf_needed_energy') | float(0) %}
          {% set planned_ts = states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) %}
          {% set now_ts = as_timestamp(now()) | int(0) %}
          {% set end_grace_ts = states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) %}
          {% set in_window = planned_ts > 0 and planned_ts <= now_ts and (end_grace_ts <= 0 or now_ts <= end_grace_ts) %}
          {% if not enabled %}
            aus
          {% elif mode != 'Akku schonen' %}
            neutral · Modus {{ mode }}
          {% elif latch and soe < target - 1 %}
            repair_needed · Latch on, SoE {{ soe | round(1) }} < Ziel {{ target | round(1) }}
          {% elif session == 'done' and need > 0.1 and in_window and soe < target - 1 %}
            reopen_needed · done trotz Bedarf {{ need | round(2) }} kWh
          {% else %}
            ok · {{ session }} · Latch {{ 'on' if latch else 'off' }} · SoE {{ soe | round(1) }} / Ziel {{ target | round(1) }}
          {% endif %}
  # <<< merged from solaredge_netzdienlich_v293c_lifetime_latch_repair.yaml

  # >>> merged from solaredge_speicher_user_settings.yaml / rc2 target SOC sensor
  - sensor:
      - name: "Speicher Ziel Ladestand"
        unique_id: speicher_ziel_ladestand
        icon: mdi:battery-check
        unit_of_measurement: "%"
        state: >-
          {% set mode = states('input_select.se_nf_optimization_mode') %}
          {% set normal_target = states('input_number.se_nf_target_soc_pct') | float(0) %}

          {% if mode == 'Akku schonen' %}
            {% set cap_entity = states('input_text.se_nf_battery_capacity_entity') | trim %}
            {% set cap_auto = states(cap_entity) | float(0) if cap_entity not in ['unknown','unavailable','none',''] else 0 %}
            {% set cap_manual = states('input_number.se_nf_battery_capacity_kwh_manual') | float(0) %}
            {% set cap = cap_auto if cap_auto > 0 else cap_manual %}

            {% set reserve_e = states('input_text.se_nf_backup_reserve_entity') | trim %}
              {% set reserve = states(reserve_e) | float(0) if reserve_e not in ['unknown','unavailable','none','None',''] else 0 %}
            {% set night = states('sensor.se_nf_lifetime_night_energy_forecast') | float(0) %}
            {% set safety = states('input_number.se_nf_lifetime_safety_kwh') | float(0) %}
            {% set extra_buffer = states('input_number.se_nf_lifetime_soc_buffer_pct') | float(0) %}
            {% set min_soc = states('input_number.se_nf_lifetime_min_target_soc_pct') | float(0) %}
            {% set max_soc = states('input_number.se_nf_lifetime_max_target_soc_pct') | float(normal_target) %}

            {% if cap > 0 %}
              {% set raw = reserve + ((night + safety) / cap * 100) + extra_buffer %}
              {{ [[raw, min_soc] | max, max_soc] | min | round(1) }}
            {% else %}
              {{ normal_target | round(1) }}
            {% endif %}
          {% else %}
            {{ normal_target | round(1) }}
          {% endif %}
        attributes:
          speicherstrategie: "{{ states('input_select.se_nf_optimization_mode') }}"
          speichergroesse_quelle: >-
            {% set cap_entity = states('input_text.se_nf_battery_capacity_entity') | trim %}
            {% set cap_auto = states(cap_entity) | float(0) if cap_entity not in ['unknown','unavailable','none',''] else 0 %}
            {% if cap_auto > 0 %}
              Sensor
            {% elif states('input_number.se_nf_battery_capacity_kwh_manual') | float(0) > 0 %}
              manuell
            {% else %}
              fehlt
            {% endif %}
          speichergroesse_kwh: >-
            {% set cap_entity = states('input_text.se_nf_battery_capacity_entity') | trim %}
            {% set cap_auto = states(cap_entity) | float(0) if cap_entity not in ['unknown','unavailable','none',''] else 0 %}
            {% set cap_manual = states('input_number.se_nf_battery_capacity_kwh_manual') | float(0) %}
            {{ (cap_auto if cap_auto > 0 else cap_manual) | round(2) }}
          geplanter_nachtbedarf_kwh: "{{ states('sensor.se_nf_lifetime_night_energy_forecast') }}"
          zusaetzlicher_puffer_pct: "{{ states('input_number.se_nf_lifetime_soc_buffer_pct') }}"
          erklaerung: "Bei Akku schonen wird der Ziel-Ladestand aus Nachtbedarf, Reserve und zusätzlichem Puffer berechnet."
  # <<< merged from solaredge_speicher_user_settings.yaml / rc2 target SOC sensor

  # >>> V3.0-rc4: mappable PV actual meter source
  - sensor:
      - name: "SE NF PV Actual Meter Source Energy"
        unique_id: se_nf_pv_actual_meter_source_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:solar-power-variant
        state: >-
          {% set bad = ['unknown','unavailable','none','None',''] %}
          {% set e = states('input_text.se_nf_pv_actual_meter_source_entity') | trim %}
          {% if e not in bad and e.startswith('sensor.') %}
            {% set v = states(e) %}
            {{ v | float(0) if v not in bad else 0 }}
          {% else %}
            0
          {% endif %}
        attributes:
          source_entity: "{{ states('input_text.se_nf_pv_actual_meter_source_entity') | trim }}"
          note: "V3.0-rc4: Utility-Meter-Quelle ist über input_text.se_nf_pv_actual_meter_source_entity konfigurierbar."
  # <<< V3.0-rc4: mappable PV actual meter source
automation:
  - id: se_nf_v288_sql_load_forecast_poll
    alias: "SolarEdge: Netzdienlich V2.8.9a SQL Load Forecast Poll"
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/10"
    action:
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.se_nf_load_forecast_7d_cached

  - id: se_nf_v28_new_day_reset
    alias: "SolarEdge: Netzdienlich V2.8 New Day Reset"
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
    action:
      - variables:
          cfg_ok: "{{ is_state('sensor.se_nf_config_check','ok') }}"
          sanity_ok: "{{ is_state('sensor.se_nf_sanity_check','ok') }}"
          soe: "{{ states('sensor.se_nf_battery_soe') | float(0) }}"
          low: "{{ states('input_number.se_nf_low_soc_floor_pct') | float(25) }}"
          evcc: "{{ is_state('binary_sensor.se_nf_evcc_grid_charge_request','on') }}"
          next_state: >-
            {% if not cfg_ok or not sanity_ok %}
              risk
            {% elif evcc %}
              evcc_override
            {% elif soe | float(0) <= low | float(25) %}
              low_soc
            {% else %}
              closed
            {% endif %}
      - service: input_select.select_option
        target:
          entity_id: input_select.se_nf_session_state
        data:
          option: "{{ next_state | trim }}"

  - id: se_nf_v28_plan_freeze
    alias: "SolarEdge: Netzdienlich V2.8.1 Plan Freeze Guard"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/15"
      - platform: state
        entity_id:
          - sensor.se_nf_today_planned_start_candidate_timestamp
          - input_select.se_nf_session_state
          - input_select.se_nf_optimization_mode
          - input_number.se_nf_replan_threshold_min
          - input_datetime.se_nf_session_planned_start
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.se_nf_config_ok
        state: "on"
    action:
      - variables:
          candidate_ts: "{{ states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) }}"
          current_ts: "{{ as_timestamp(states('input_datetime.se_nf_session_planned_start'), 0) | int(0) }}"
          threshold_s: "{{ states('input_number.se_nf_replan_threshold_min') | int(30) * 60 }}"
          min_hour: "{{ states('sensor.se_nf_mode_min_start_hour') | float(11.75) }}"
          min_h: "{{ min_hour | int(0) }}"
          min_m: "{{ ((min_hour | float(11.75) - min_h | int(0)) * 60) | round(0) | int(0) }}"
          min_ts: "{{ as_timestamp(today_at('%02d:%02d:00' | format(min_h | int(0), min_m | int(0))), 0) | int(0) }}"
          end_grace_ts: "{{ states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) }}"
          day_start_ts: "{{ as_timestamp(today_at('06:00:00'), 0) | int(0) }}"
          current_valid: "{{ current_ts | int(0) >= min_ts | int(0) and current_ts | int(0) <= end_grace_ts | int(0) }}"
          state_now: "{{ states('input_select.se_nf_session_state') }}"
          critical_planned_valid: >-
            {{ is_state('input_boolean.se_nf_critical_deficit_latched_today','on')
               and current_ts | int(0) > 0
               and current_ts | int(0) >= day_start_ts | int(0)
               and current_ts | int(0) <= end_grace_ts | int(0)
               and is_state('sensor.se_nf_sanity_check','ok')
               and is_state('sensor.se_nf_config_check','ok')
               and is_state('binary_sensor.se_nf_risk_flag','off') }}
          may_replan: >-
            {{ (state_now in ['closed','armed'] or not current_valid)
               and not critical_planned_valid }}
      - condition: template
        value_template: >-
          {{ candidate_ts | int(0) > 0
             and may_replan
             and (
               not current_valid
               or current_ts | int(0) <= 0
               or (candidate_ts | int(0) - current_ts | int(0)) | abs >= threshold_s | int(1800)
             ) }}
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_session_planned_start
        data:
          datetime: "{{ (candidate_ts | int(0)) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

  - id: se_nf_v28_session_manager
    alias: "SolarEdge: Netzdienlich V2.8.1 Session Manager"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id:
          - input_boolean.se_netzdienlich_enabled
          - input_select.se_nf_session_state
          - input_select.se_nf_optimization_mode
          - sensor.se_nf_config_check
          - sensor.se_nf_sanity_check
          - sensor.se_nf_battery_soe
          - sensor.se_nf_needed_energy
          - input_datetime.se_nf_session_planned_start
          - sensor.se_nf_active_planned_start_timestamp
          - input_datetime.se_nf_last_open_write
          - binary_sensor.se_nf_evcc_grid_charge_request
    action:
      - variables:
          enabled: "{{ is_state('input_boolean.se_netzdienlich_enabled','on') }}"
          cfg_ok: "{{ is_state('sensor.se_nf_config_check','ok') }}"
          sanity_ok: "{{ is_state('sensor.se_nf_sanity_check','ok') }}"
          now_ts: "{{ now().timestamp() | int(0) }}"
          day_start_ts: "{{ as_timestamp(today_at('06:00:00'), 0) | int(0) }}"
          planned_ts: "{{ as_timestamp(states('input_datetime.se_nf_session_planned_start'), 0) | int(0) }}"
          active_planned_ts: "{{ states('sensor.se_nf_active_planned_start_timestamp') | int(0) }}"
          candidate_ts: "{{ states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) }}"
          last_open_ts: "{{ as_timestamp(states('input_datetime.se_nf_last_open_write'), 0) | int(0) }}"
          end_grace_ts: "{{ states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) }}"
          min_hour: "{{ states('sensor.se_nf_mode_min_start_hour') | float(11.75) }}"
          min_h: "{{ min_hour | int(0) }}"
          min_m: "{{ ((min_hour | float(11.75) - min_h | int(0)) * 60) | round(0) | int(0) }}"
          min_ts: "{{ as_timestamp(today_at('%02d:%02d:00' | format(min_h | int(0), min_m | int(0))), 0) | int(0) }}"
          critical_planned_valid: >-
            {{ is_state('input_boolean.se_nf_critical_deficit_latched_today','on')
               and planned_ts | int(0) > 0
               and planned_ts | int(0) >= day_start_ts | int(0)
               and planned_ts | int(0) <= end_grace_ts | int(0)
               and cfg_ok
               and sanity_ok
               and is_state('binary_sensor.se_nf_risk_flag','off') }}
          planned_valid: "{{ (planned_ts | int(0) >= min_ts | int(0) and planned_ts | int(0) <= end_grace_ts | int(0)) or critical_planned_valid }}"
          opened_today: "{{ last_open_ts | int(0) >= day_start_ts | int(0) and last_open_ts | int(0) > 0 }}"
          valid_planned_open_today: >-
            {{ last_open_ts | int(0) >= day_start_ts | int(0)
               and last_open_ts | int(0) > 0
               and planned_valid
               and planned_ts | int(0) > 0
               and last_open_ts | int(0) >= (planned_ts | int(0) - 60) }}
          soe: "{{ states('sensor.se_nf_battery_soe') | float(0) }}"
          low: "{{ states('input_number.se_nf_low_soc_floor_pct') | float(25) }}"
          need: "{{ states('sensor.se_nf_needed_energy') | float(0) }}"
          evcc: "{{ is_state('binary_sensor.se_nf_evcc_grid_charge_request','on') }}"
          mode: "{{ states('input_select.se_nf_optimization_mode') }}"
          lifetime_reached: "{{ is_state('input_boolean.se_nf_lifetime_target_reached','on') }}"
          next_state: >-
            {% if not enabled %}
              closed
            {% elif evcc %}
              evcc_override
            {% elif not cfg_ok or not sanity_ok %}
              risk
            {% elif soe | float(0) <= low | float(25) %}
              low_soc
            {% elif mode == 'Eigenverbrauch maximieren' %}
              open
            {% elif mode == 'Akku schonen' and lifetime_reached %}
              done
            {% elif valid_planned_open_today and end_grace_ts | int(0) > 0 and now_ts | int(0) <= end_grace_ts | int(0) %}
              {% if need | float(0) <= 0.05 %}
                battery_full_open
              {% else %}
                open
              {% endif %}
            {% elif valid_planned_open_today and end_grace_ts | int(0) > 0 and now_ts | int(0) > end_grace_ts | int(0) %}
              done
            {% elif planned_valid and planned_ts | int(0) > 0 and now_ts | int(0) >= planned_ts | int(0) %}
              {% if need | float(0) <= 0.05 %}
                battery_full_open
              {% else %}
                open
              {% endif %}
            {% elif planned_valid and planned_ts | int(0) > 0 %}
              armed
            {% elif candidate_ts | int(0) > 0 %}
              armed
            {% else %}
              closed
            {% endif %}
      - condition: template
        value_template: "{{ states('input_select.se_nf_session_state') != next_state | trim }}"
      - service: input_select.select_option
        target:
          entity_id: input_select.se_nf_session_state
        data:
          option: "{{ next_state | trim }}"



  - id: se_nf_v29_lifetime_latch_reset
    alias: "SolarEdge: Netzdienlich V2.9 Lebensdauer Latch Reset"
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_select.se_nf_optimization_mode
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ trigger.platform == 'time'
                     or states('input_select.se_nf_optimization_mode') != 'Akku schonen' }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.se_nf_lifetime_target_reached

  - id: se_nf_v29_lifetime_target_latch
    alias: "Speichermanagement: Akku schonen Ziel erreicht"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.se_nf_battery_soe
          - sensor.speicher_ziel_ladestand
          - input_select.se_nf_session_state
          - input_select.se_nf_optimization_mode
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      - condition: state
        entity_id: input_select.se_nf_optimization_mode
        state: "Akku schonen"
      - condition: template
        value_template: >-
          {{ states('input_select.se_nf_session_state') in ['open','battery_full_open'] }}
      - condition: template
        value_template: >-
          {{ states('sensor.se_nf_battery_soe') | float(0)
             >= states('sensor.speicher_ziel_ladestand') | float(100) }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.se_nf_lifetime_target_reached
      - service: input_select.select_option
        target:
          entity_id: input_select.se_nf_session_state
        data:
          option: done


  - id: se_nf_v28_single_writer
    alias: "SolarEdge: Netzdienlich V2.8.9a Single Writer Safety Guard"
    mode: single
    max_exceeded: silent
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - sensor.se_nf_desired_target
          - input_select.se_nf_session_state
          - input_select.se_nf_optimization_mode
          - input_boolean.se_netzdienlich_enabled
          - sensor.se_nf_config_check
          - sensor.se_nf_sanity_check
          - number.solaredge_i1_storage_charge_limit
          - sensor.se_nf_charge_limit_actual
    action:
      - delay: >-
          {% if trigger.platform == 'homeassistant' %}00:02:30{% else %}00:00:00{% endif %}
      - variables:
          debug: "{{ is_state('input_boolean.se_netzdienlich_debug','on') }}"
          entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          configured_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          target_w: "{{ states('sensor.se_nf_desired_target') | float(5000) }}"
          current_w: "{{ states(entity) | float(999999) }}"
          delta_w: "{{ (target_w | float(5000) - current_w | float(999999)) | abs }}"
          min_delta_w: "{{ states('input_number.se_nf_write_min_delta_w') | float(100) }}"
          cooldown_s: "{{ states('input_number.se_nf_write_cooldown_s') | int(600) }}"
          lock_s: "{{ states('input_number.se_nf_write_lock_s') | int(60) }}"
          last_write_ts: "{{ as_timestamp(states('input_datetime.se_nf_last_write'), 0) | int(0) }}"
          now_ts: "{{ now().timestamp() | int(0) }}"
          cooldown_ok: "{{ (now_ts | int(0) - last_write_ts | int(0)) >= cooldown_s | int(600) }}"
          lock_active: "{{ is_state('binary_sensor.se_nf_write_lock_active','on') }}"
          # V2.9.3h: Safety-Close + plausible Open
          target_open_plausible: >-
            {% set s = states('input_select.se_nf_session_state') %}
            {% set start_ts = states('sensor.se_nf_active_planned_start_timestamp') | int(0) %}
            {% set now_i = now().timestamp() | int(0) %}
            {{ s in ['evcc_override','low_soc','risk']
               or (s in ['open','battery_full_open'] and start_ts > 0 and now_i >= start_ts) }}
          target_open_is_risk: >-
            {{ is_state('input_select.se_nf_session_state','risk') }}
          target_open_stable_s: >-
            {{ (now().timestamp() | int(0)) -
               (as_timestamp(states.input_select.se_nf_session_state.last_changed, 0) | int(0)) }}
          target_open_allowed: >-
            {{ target_open_plausible
               and (
                 not target_open_is_risk
                 or target_open_stable_s | int(0) >= 90
               ) }}
          priority_open_write: >-
            {{ target_w | float(0) >= 4750 and target_open_allowed }}
          safety_close_write: >-
            {{ target_w | float(0) <= 50 and current_w | float(0) > 50 }}
          normal_write_window_ok: "{{ cooldown_ok and not lock_active }}"
          write_allowed: >-
            {{ states(entity) not in ['unknown','unavailable','none','']
               and target_w | float(5000) >= 0
               and target_w | float(5000) <= 5000
               and current_w | float(999999) <= 5000
               and delta_w | float(0) >= min_delta_w | float(100)
               and (
                    safety_close_write
                    or priority_open_write
                    or (normal_write_window_ok and (target_w | float(0) < 4750 or target_open_allowed))
               ) }}
      - if:
          - condition: template
            value_template: "{{ debug }}"
        then:
          - service: system_log.write
            data:
              level: info
              message: >-
                SE NF V2.8.9a Writer Check: state={{ states('input_select.se_nf_session_state') }},
                target={{ target_w }}W, current={{ current_w }}W, delta={{ delta_w }}W,
                configured_entity={{ configured_entity }}, fixed_entity={{ entity }},
                priority_open={{ priority_open_write }},
                cooldown_ok={{ cooldown_ok }}, lock_active={{ lock_active }},
                allowed={{ write_allowed }}, reason={{ states('sensor.se_nf_decision_reason') }}
      - condition: template
        value_template: "{{ write_allowed }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_last_write
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_write_lock_until
        data:
          datetime: "{{ (now() + timedelta(seconds=lock_s | int(60))).strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.se_nf_last_applied_charge_limit_w
        data:
          value: "{{ target_w | float(5000) | round(0) }}"
      - if:
          - condition: template
            value_template: >-
              {% set s = states('input_select.se_nf_session_state') %}
              {% set planned_ts = as_timestamp(states('input_datetime.se_nf_session_planned_start'), 0) | int(0) %}
              {% set now_ts = now().timestamp() | int(0) %}
              {{ target_w | float(0) >= 4750
                 and s in ['open','battery_full_open']
                 and planned_ts > 0
                 and now_ts >= planned_ts }}
        then:
          - service: input_datetime.set_datetime
            target:
              entity_id: input_datetime.se_nf_last_open_write
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: number.set_value
        data:
          entity_id: >-
            {{ entity | string | replace('"','') | replace("'",'') | replace('\\','') | trim }}
          value: "{{ target_w | float(5000) | round(0) }}"
      - if:
          - condition: template
            value_template: "{{ debug }}"
        then:
          - service: system_log.write
            data:
              level: info
              message: "SE NF V2.8.9a Writer wrote {{ target_w }}W to {{ entity }}"

  # >>> merged from solaredge_netzdienlich_v293c_lifetime_latch_repair.yaml
  - id: se_nf_v293c_lifetime_latch_repair
    alias: "SolarEdge: Netzdienlich V2.9.3c Lifetime Latch Repair"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - input_boolean.se_nf_lifetime_target_reached
          - input_select.se_nf_session_state
          - sensor.se_nf_battery_soe
          - sensor.speicher_ziel_ladestand
          - sensor.se_nf_needed_energy
          - sensor.se_nf_today_planned_start_candidate_timestamp
          - sensor.se_nf_today_end_with_grace_timestamp

    condition:
      - condition: state
        entity_id: input_boolean.se_nf_lifetime_latch_repair_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      - condition: state
        entity_id: input_select.se_nf_optimization_mode
        state: "Akku schonen"
      - condition: state
        entity_id: sensor.se_nf_config_check
        state: "ok"
      - condition: state
        entity_id: sensor.se_nf_sanity_check
        state: "ok"
      - condition: state
        entity_id: binary_sensor.se_nf_risk_flag
        state: "off"

    action:
      - variables:
          session: "{{ states('input_select.se_nf_session_state') }}"
          latch_on: "{{ is_state('input_boolean.se_nf_lifetime_target_reached','on') }}"
          soe: "{{ states('sensor.se_nf_battery_soe') | float(0) }}"
          target: "{{ states('sensor.speicher_ziel_ladestand') | float(100) }}"
          need: "{{ states('sensor.se_nf_needed_energy') | float(0) }}"
          planned_ts: "{{ states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) }}"
          end_grace_ts: "{{ states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) }}"
          now_ts: "{{ as_timestamp(now()) | int(0) }}"
          start_due: "{{ planned_ts | int(0) > 0 and planned_ts | int(0) <= now_ts | int(0) }}"
          before_end: "{{ end_grace_ts | int(0) <= 0 or now_ts | int(0) <= end_grace_ts | int(0) }}"
          latch_wrong: "{{ latch_on and soe | float(0) < (target | float(100) - 1.0) }}"
          reopen_needed: >-
            {{ session == 'done'
               and need | float(0) > 0.10
               and start_due
               and before_end
               and soe | float(0) < (target | float(100) - 1.0) }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ latch_wrong }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.se_nf_lifetime_target_reached

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ reopen_needed }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.se_nf_session_state
                data:
                  option: "armed"
  # <<< merged from solaredge_netzdienlich_v293c_lifetime_latch_repair.yaml

  # >>> merged from solaredge_netzdienlich_v293g_critical_deficit_daily_latch.yaml
  - id: se_nf_v293g_critical_deficit_daily_latch
    alias: "SolarEdge: Netzdienlich V2.9.3h Critical Deficit Daily Latch"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id:
          - input_boolean.se_netzdienlich_enabled
          - input_select.se_nf_session_state
          - sensor.se_nf_needed_energy
          - sensor.se_nf_available_pv_for_battery_today
          - sensor.se_nf_live_battery_pv_margin
          - sensor.se_nf_live_pv_forecast_now
          - sensor.se_nf_remaining_pv_today
          - sensor.se_nf_sanity_check
          - sensor.se_nf_config_check
          - binary_sensor.se_nf_risk_flag
          - binary_sensor.se_nf_evcc_grid_charge_request
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      # V2.9.3g1a: Critical-Latch nur im heutigen Planungsfenster
      - condition: template
        value_template: >-
          {% set now_ts = now().timestamp() | int(0) %}
          {% set day_start_ts = as_timestamp(today_at('06:00:00'), 0) | int(0) %}
          {% set end_grace_ts = states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) %}
          {{ now_ts >= day_start_ts and (end_grace_ts <= 0 or now_ts <= end_grace_ts) }}
      - condition: template
        value_template: "{{ states('input_select.se_nf_session_state') in ['closed','armed'] }}"
      - condition: state
        entity_id: sensor.se_nf_sanity_check
        state: "ok"
      - condition: state
        entity_id: sensor.se_nf_config_check
        state: "ok"
      - condition: state
        entity_id: binary_sensor.se_nf_risk_flag
        state: "off"
      - condition: state
        entity_id: binary_sensor.se_nf_evcc_grid_charge_request
        state: "off"
      - condition: state
        entity_id: input_boolean.se_nf_critical_deficit_latched_today
        state: "off"
      - condition: template
        alias: "V2.9.3h Guard: Critical Deficit nur bei echtem Defizit"
        value_template: >-
          {% set soe = states('sensor.solaredge_i1_b1_state_of_energy') | float(0) %}
          {% set reserve = states('number.solaredge_i1_backup_reserve') | float(0) %}
          {% set need = states('sensor.se_nf_needed_energy') | float(0) %}
          {% set pv_for_akku = states('sensor.se_nf_available_pv_for_battery_today') | float(99) %}
          {% set effective_raw = states('sensor.se_nf_effective_available_pv_for_battery') %}
          {% set effective_pv = effective_raw | float(pv_for_akku) if effective_raw not in ['unknown','unavailable','none',''] else pv_for_akku %}
          {% set delta = states('sensor.se_nf_effective_pv_delta') | float(0) %}
          {% set margin = states('sensor.se_nf_live_battery_pv_margin') | float(99) %}
          {% set remaining = states('sensor.se_nf_remaining_pv_today') | float(0) %}
          {% set forecast_now = states('sensor.se_nf_live_pv_forecast_now') | float(0) %}
          {% set good_day = states('sensor.se_nf_good_day_for_late_start') | lower == 'true' %}
          {% set pv_now = states('sensor.power_solar_generation') | float(0) %}
          {% set cons_now = states('sensor.power_consumption') | float(0) %}
          {% set surplus_now = pv_now - cons_now %}
          {% set early_def = states('input_number.se_nf_early_open_deficit_kwh') | float(0.2) %}
          {% set real_deficit = [need - effective_pv, 0] | max %}
          {% set min_deficit = [early_def, 0.5] | max %}
          {% set soc_limit = [reserve + 12, 35] | max %}
          
          {{
            need >= 2.0
            and soe <= soc_limit
            and not good_day
            and remaining > 1.0
            and forecast_now >= 100
            and real_deficit >= min_deficit
            and delta < -0.5
            and surplus_now < 500
            and (margin <= -3.0 or pv_for_akku < (need * 0.50))
          }}
      - condition: template
        value_template: >-
          {{ true }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.se_nf_critical_deficit_latched_today
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_session_planned_start
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: system_log.write
        data:
          level: warning
          message: >-
            SE NF V2.9.3h Critical Deficit: Tages-Latch gesetzt und geplanter Start einmalig auf jetzt gesetzt.

  - id: se_nf_v293g_critical_deficit_daily_latch_reset
    alias: "SolarEdge: Netzdienlich V2.9.3h Critical Deficit Daily Latch Reset"
    mode: single
    trigger:
      - platform: time
        at: "05:30:00"
      - platform: homeassistant
        event: start
    condition:
      - condition: template
        value_template: >-
          {% set planned_ts = as_timestamp(states('input_datetime.se_nf_session_planned_start'), 0) | int(0) %}
          {% set day_start_ts = as_timestamp(today_at('06:00:00'), 0) | int(0) %}
          {{ planned_ts <= 0 or planned_ts < day_start_ts }}
    # V2.9.3g2: Duplicate condition entfernt; obige Bedingung bleibt aktiv
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.se_nf_critical_deficit_latched_today
  # <<< merged from solaredge_netzdienlich_v293g_critical_deficit_daily_latch.yaml

