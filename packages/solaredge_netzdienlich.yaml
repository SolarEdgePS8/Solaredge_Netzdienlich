          {% set cap = states('sensor.se_nf_battery_capacity_kwh') | float(0) %}
          {% set reserve = states('sensor.se_nf_backup_reserve_pct') | float(0) %}
          {% if mode == 'Akku schonen' and cap > 0 %}
            {% set night = states('sensor.se_nf_lifetime_night_energy_forecast') | float(states('input_number.se_nf_lifetime_night_fallback_kwh') | float(4.5)) %}
