          soe_age_s: "{{ states('sensor.se_nf_soe_age_s') }}"
          charge_limit_age_s: "{{ states('sensor.se_nf_charge_limit_age_s') }}"
          max_age_s: "{{ states('input_number.se_nf_max_sensor_age_s') | int(14400) }}"
      - name: "SE NF Writer Mode"
        unique_id: se_nf_writer_mode
        icon: mdi:pencil-ruler
        state: >-
          {% set target = states('sensor.se_nf_desired_target') | float(5000) %}
          {% set current = states('sensor.se_nf_charge_limit_actual') | float(999999) %}
          {% set delta = (target - current) | abs %}
          {% set min_delta = states('input_number.se_nf_write_min_delta_w') | float(100) %}
          {% set cooldown_s = states('input_number.se_nf_write_cooldown_s') | int(600) %}
          {% set last_write_ts = as_timestamp(states('input_datetime.se_nf_last_write'), 0) | int(0) %}
          {% set now_ts = now().timestamp() | int(0) %}
          {% set cooldown_ok = (now_ts - last_write_ts) >= cooldown_s %}
          {% set lock_active = is_state('binary_sensor.se_nf_write_lock_active','on') %}
          {% if states(states('input_text.se_nf_charge_limit_entity') | trim) in ['unknown','unavailable','none',''] %}
            blocked_invalid
          {% elif delta < min_delta %}
            idle
          {% elif target >= 4750 %}
            priority_open
          {% elif lock_active %}
            blocked_lock
          {% elif not cooldown_ok %}
            blocked_cooldown
          {% else %}
            normal
          {% endif %}
        attributes:
          target_w: "{{ states('sensor.se_nf_desired_target') }}"
          current_w: "{{ states('sensor.se_nf_charge_limit_actual') }}"
          delta_w: >-
            {% set target = states('sensor.se_nf_desired_target') | float(5000) %}
            {% set current = states('sensor.se_nf_charge_limit_actual') | float(999999) %}
            {{ (target - current) | abs | round(0) }}
          priority_open: "{{ states('sensor.se_nf_desired_target') | float(0) >= 4750 }}"

