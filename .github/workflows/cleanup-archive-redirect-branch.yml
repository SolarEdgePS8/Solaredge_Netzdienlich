name: Cleanup archived repository branch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'docs/archive-and-redirect'
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged archive branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: docs/archive-and-redirect
        run: |
          set -euo pipefail
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}"
          echo "Deleted ${BRANCH}."
