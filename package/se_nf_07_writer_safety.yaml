# V2.9.6 Portability/Modbus Robustness
# - Charge- und Discharge-Limit werden über Mapping-Helfer angesprochen
# - Close-Bypass nutzt internen Actual-Sensor statt harter Entity-ID
# - Master AUS schreibt nur bei echter Abweichung und verhindert überlappende Läufe

input_text:
  se_nf_discharge_limit_entity:
    name: "Netzdienlich: SolarEdge Discharge-Limit Entity optional"
    icon: mdi:battery-arrow-down-outline
    max: 255
automation:
  # ============================================================
  # SE NF V2.9.4a
  # Master AUS = Fail-open Defaults
  # Ziel:
  # - Netzdienlich AUS darf den SolarEdge nicht limitiert lassen
  # - Charge Limit zurück auf 5000 W
  # - Discharge Limit zurück auf 5000 W
  # - Session geschlossen
  # ============================================================
  - id: se_nf_v294a_master_off_defaults
    alias: "SolarEdge: Netzdienlich V2.9.6 Master AUS Defaults"
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id: input_boolean.se_netzdienlich_enabled
        to: "off"
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "off"
    action:
      - variables:
          charge_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          discharge_entity: "{{ states('input_text.se_nf_discharge_limit_entity') | trim }}"
          default_w: 5000
          min_delta_w: "{{ states('input_number.se_nf_write_min_delta_w') | float(100) }}"
          charge_valid: >-
            {{ charge_entity not in ['unknown','unavailable','none','']
               and states(charge_entity) not in ['unknown','unavailable','none',''] }}
          discharge_valid: >-
            {{ discharge_entity not in ['unknown','unavailable','none','']
               and states(discharge_entity) not in ['unknown','unavailable','none',''] }}
          charge_current: "{{ states(charge_entity) | float(default_w) }}"
          discharge_current: "{{ states(discharge_entity) | float(default_w) }}"
          charge_needs_reset: >-
            {{ charge_valid
               and ((((charge_current | float(default_w)) - (default_w | float(5000))) | abs)
                    >= (min_delta_w | float(100))) }}
          discharge_needs_reset: >-
            {{ discharge_valid
               and ((((discharge_current | float(default_w)) - (default_w | float(5000))) | abs)
                    >= (min_delta_w | float(100))) }}
          reset_needed: "{{ charge_needs_reset or discharge_needs_reset }}"

      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.se_nf_critical_deficit_latched_today
            - input_boolean.se_nf_lifetime_target_reached

      - service: input_select.select_option
        target:
          entity_id: input_select.se_nf_session_state
        data:
          option: "closed"

      - if:
          - condition: template
            value_template: "{{ charge_needs_reset }}"
        then:
          - service: number.set_value
            data:
              entity_id: "{{ charge_entity }}"
              value: "{{ default_w }}"

      - if:
          - condition: template
            value_template: "{{ discharge_needs_reset }}"
        then:
          - service: number.set_value
            data:
              entity_id: "{{ discharge_entity }}"
              value: "{{ default_w }}"

      - condition: template
        value_template: "{{ reset_needed }}"

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_last_write
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: system_log.write
        data:
          level: warning
          message: >-
            SE NF V2.9.6 Master AUS Defaults: Nur abweichende, gültig gemappte Charge-/Discharge-Limits wurden auf 5000 W zurückgesetzt.

  # ============================================================
  # SE NF V2.9.4b
  # Close darf Cooldown umgehen
  # Ziel:
  # - Nach Master EIN muss target=0 sofort wieder schließen
  # - Cooldown darf kein Sicherheits-/Planungs-Close blockieren
  # - Behebt: target=0, actual=5000, writer_mode=blocked_cooldown
  # ============================================================
  - id: se_nf_v294b_writer_close_bypass
    alias: "SolarEdge: Netzdienlich V2.9.4b Writer Close Bypass"
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.se_netzdienlich_enabled
          - sensor.se_nf_charge_limit_target
          - sensor.se_nf_desired_target
          - sensor.se_nf_writer_mode
          - sensor.se_nf_charge_limit_actual
      - platform: time_pattern
        minutes: "/1"

    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"

      - condition: template
        value_template: >-
          {% set target = states('sensor.se_nf_charge_limit_target') | float(states('sensor.se_nf_desired_target') | float(5000)) %}
          {% set actual = states('sensor.se_nf_charge_limit_actual') | float(0) %}
          {% set mode = states('sensor.se_nf_writer_mode') %}
          {{
            target <= 100
            and actual >= 1000
            and mode in ['blocked_cooldown', 'blocked_lock', 'priority_open', 'normal', 'idle']
          }}

    action:
      - service: number.set_value
        data:
          entity_id: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          value: 0

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.se_nf_last_write
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: system_log.write
        data:
          level: warning
          message: >-
            SE NF V2.9.4b Writer Close Bypass: target <= 100 W und actual >= 1000 W, deshalb Charge-Limit sofort auf 0 W gesetzt.
